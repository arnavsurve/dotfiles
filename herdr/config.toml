[ui.toast]
delivery = "system"

[theme]
name = "terminal"
auto_switch = true 

[ui]
show_agent_labels_on_pane_borders = true

[keys]
prefix = "ctrl+a"
split_horizontal = "prefix+minus"
split_vertical = "prefix+|"

[[keys.command]]
key = "cmd+r"
type = "plugin_action"
command = "persiyanov.reviewr.toggle"
